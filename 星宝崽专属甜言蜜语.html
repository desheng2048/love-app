            right: -30px;

        }

            font-size: 18px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;

            border-radius: 16px;
            font-weight: 500;
            animation: fadeIn 0.6s ease;
        }

                transform: translateY(15px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            from {

            }
            to {

            }

        @keyframes pulse {
            0%, 100% {

            }
            50% {

            }
        }

            0%, 100% {

                transform: scale(1) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.2) rotate(180deg);
            }

        .fortune-grid {
            display: grid;
            gap: 12px;
        }

        .fortune-item {

            border-radius: 14px;
            display: flex;
            align-items: center;

        .fortune-item:hover {

        }

        .fortune-icon {

            flex-shrink: 0;
            animation: sparkle 3s infinite ease-in-out;
        }

            animation-delay: 0.5s;
        }

        .fortune-item:nth-child(3) .fortune-icon {
            animation-delay: 1s;
        }

        .fortune-item:nth-child(4) .fortune-icon {
            animation-delay: 1.5s;
        }

        .fortune-item:nth-child(5) .fortune-icon {
            animation-delay: 2s;

</head>

        const fortuneIcons = {
            '爱情运': '💕',
            '今日宜': '✨',
            '今日忌': '❌',
            '幸运色': '🎨',
            '幸运数字': '🔢',
            '幸运物': '🍀'
        };

        let currentCategory = '全部';
        let clickCount = 0;

        // 初始化装饰元素
        function initDecorations() {
            const decorations = document.getElementById('decorations');
            const emojis = ['⭐', '✨', '💫', '🌟', '💕', '🎀', '🌸', '💗', '💖', '✨'];
            for (let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                el.className = 'decoration';
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.top = Math.random() * 100 + '%';
                el.style.animationDelay = Math.random() * 4 + 's';
                el.style.animationDuration = (6 + Math.random() * 4) + 's';
                decorations.appendChild(el);
            }
        }

        // 星星轨迹效果
        function createStarTrail(x, y) {
            const star = document.createElement('div');
            star.className = 'star-trail';
            star.style.left = x + 'px';
            star.style.top = y + 'px';
            document.body.appendChild(star);
            
            setTimeout(() => {
                star.remove();
            }, 1000);
        }

        // 鼠标移动时产生星星轨迹
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.9) {
                createStarTrail(e.clientX, e.clientY);
            }
        });

        // 初始化分类标签
        function initCategoryTabs() {
            const categories = Object.keys(loveMessages);
            const tabsContainer = document.getElementById('categoryTabs');
            
            categories.forEach(cat => {
                const tab = document.createElement('div');
                tab.className = `tab ${cat === '全部' ? 'active' : ''}`;
                tab.textContent = cat;
                tab.onclick = () => switchCategory(cat, tab);
                tabsContainer.appendChild(tab);
            });

            // 更新总数量
            const totalMessages = Object.values(loveMessages).flat().length;
            document.getElementById('totalCount').textContent = totalMessages;
        }

        // 切换分类
        function switchCategory(category, tabElement) {
            currentCategory = category;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tabElement.classList.add('active');
            getRandomLove();
        }

        // 获取随机情话（根据日期每天随机展示精选内容）
        function getRandomLove() {
            const messages = loveMessages[currentCategory];
            
            // 根据当前时间和点击次数生成随机种子
            const now = new Date();
            const timeSeed = now.getTime();
            const clickSeed = clickCount * 13; // 乘以13增加随机性
            const seed = timeSeed + clickSeed;
            
            // 使用简单的伪随机算法
            const randomIndex = Math.floor(Math.abs(Math.sin(seed)) * messages.length);
            const random = messages[randomIndex];
            
            const loveText = document.getElementById('loveText');
            loveText.style.animation = 'none';
            loveText.offsetHeight;
            loveText.style.animation = 'fadeIn 0.6s ease';
            loveText.textContent = random;

            // 增加点击计数
            clickCount++;
            
            // 按钮动画反馈
            const btn = document.getElementById('refreshBtn');
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
            }, 150);
        }

        // 加载运势（根据日期每天随机展示不同的运势）
        function loadFortune() {
            // 根据日期获取种子，确保每天显示不同的运势
            const today = new Date();
            const dateStr = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
            const seed = dateStr.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const fortuneIndex = seed % fortuneLibrary.length;
            const todayFortune = fortuneLibrary[fortuneIndex];
            
            const grid = document.getElementById('fortuneGrid');
            grid.innerHTML = ''; // 清空现有内容
            
            Object.entries(todayFortune).forEach(([type, content], index) => {
                const item = document.createElement('div');
                item.className = 'fortune-item';
                item.style.animationDelay = `${index * 0.1}s`;
                const icon = fortuneIcons[type] || '✨';
                item.innerHTML = `
                    <span class="fortune-icon">${icon}</span>
                    <span><strong>${type}：</strong>${content}</span>
                `;
                grid.appendChild(item);
            });
        }

        // 揭示运势
        function revealFortune() {
            const cover = document.getElementById('fortuneCover');
            const content = document.getElementById('fortuneContent');
            
            // 隐藏封面，显示内容
            cover.style.display = 'none';
            content.classList.add('show');
            
            // 加载运势内容
            loadFortune();
            
            // 添加一些魔法效果
            createMagicEffect();
        }

        // 创建魔法效果
        function createMagicEffect() {
            const fortuneCard = document.querySelector('.fortune-card');
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.textContent = '✨';
                    sparkle.style.position = 'absolute';
                    sparkle.style.left = Math.random() * 100 + '%';
                    sparkle.style.top = Math.random() * 100 + '%';
                    sparkle.style.fontSize = '20px';
                    sparkle.style.opacity = '0';
                    sparkle.style.transform = 'scale(0)';
                    sparkle.style.transition = 'all 0.6s ease';
                    sparkle.style.zIndex = '100';
                    fortuneCard.appendChild(sparkle);
                    
                    setTimeout(() => {
                        sparkle.style.opacity = '1';
                        sparkle.style.transform = 'scale(1.5)';
                    }, 50);
                    
                    setTimeout(() => {
                        sparkle.style.opacity = '0';
                        sparkle.style.transform = 'scale(0) translateY(-30px)';
                    }, 500);
                    
                    setTimeout(() => {
                        sparkle.remove();
                    }, 1100);
                }, i * 50);
            }
        }

        window.onload = function() {
            initDecorations();
            initCategoryTabs();
            // 不再自动加载运势，等待用户点击
            getRandomLove();

        // 更新日期显示
        function updateDateDisplay() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekDay = weekDays[now.getDay()];
            
            document.getElementById('currentDate').textContent = `${year}年${month}月${day}日 ${weekDay}`;
            
            // 根据星期几显示不同的每日寄语
